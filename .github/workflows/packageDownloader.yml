name: Download Batocera Source Package

on:
  workflow_dispatch:
    inputs:
      board:
        description: "Board name (e.g., jh7110)"
        required: true
        default: "rk3399"

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      BOARD: ${{ github.event.inputs.board }}
      DIRECT_BUILD: 1
      TIMESTAMP: ${{ steps.datetag.outputs.timestamp }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git libncurses5-dev libssl-dev mercurial texinfo zip default-jre imagemagick subversion autoconf automake bison scons libglib2.0-dev bc mtools u-boot-tools flex wget cpio dosfstools libtool gcc-multilib g++-multilib python3-pip
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y libc6:i386 libncurses6:i386 libstdc++6:i386
          pip3 install conan

      - name: Generate Timestamp for Release Tag
        id: datetag
        run: |
          echo "Timestamp: $(date +'%Y-%m-%d')" >> $GITHUB_ENV
          echo "::set-output name=timestamp::$(date +'%Y-%m-%d')"

      - name: Build for ${{ env.BOARD }}
        run: |
          make ${BOARD}-source

      - name: Archive dl directory
        run: |
          # Create a tar.gz file for the dl directory
          tar -czf "${BOARD}-dl-${{ env.TIMESTAMP }}.tar.gz" dl

      - name: Check for existing release
        id: check-release
        uses: actions/github-script@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          script: |
            const tag = `v2025-5-${{ env.TIMESTAMP }}-${{ env.BOARD }}-package-dl`
            try {
              const release = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                tag
              })
              core.setOutput('upload_url', release.data.upload_url)
            } catch (error) {
              if (error.status === 404) {
                core.setOutput('upload_url', '')
              } else {
                throw error
              }
            }

      - name: Create release if it doesn’t exist
        if: steps.check-release.outputs.upload_url == ''
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name:    v2025-5-${{ env.TIMESTAMP }}-${{ env.BOARD }}-package-dl
          release_name: "v2025-5-${{ env.TIMESTAMP }}-${{ env.BOARD }}-package-dl"
          draft:       false
          prerelease:  false

      - name: Set final upload_url
        id: set-upload-url
        run: |
          if [[ "${{ steps.check-release.outputs.upload_url }}" != "" ]]; then
            echo "upload_url=${{ steps.check-release.outputs.upload_url }}" >> $GITHUB_OUTPUT
          else
            echo "upload_url=${{ steps.create_release.outputs.upload_url }}" >> $GITHUB_OUTPUT
          fi

      - name: Upload dl archive asset
        uses: actions/upload-release-asset@v1
        with:
          upload_url:   ${{ steps.set-upload-url.outputs.upload_url }}
          asset_path:   ./${{ env.BOARD }}-dl-${{ env.TIMESTAMP }}.tar.gz
          asset_name:   ${BOARD}-dl-${{ env.TIMESTAMP }}.tar.gz
          asset_content_type: application/gzip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
